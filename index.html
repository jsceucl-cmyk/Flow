<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataflow – Drag & Drop</title>

<style>
/* ============================================
   GENERELT LAYOUT
   ============================================ */
body{
    background:#111;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
}

/* ============================================
   HEADER / LOGO
   ============================================ */
.mobile-header{
    background:#000;
    border-bottom:3px solid #444;
    padding:12px 0;
}
.mobile-header .header-inner{
    max-width:900px;
    margin:auto;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:0 12px;
}
.mobile-header img{
    width:150px;
    height:auto;
}
.mobile-header h1{
    font-size:26px;
    color:#ffcc66;
    margin:0;
}
@media(max-width:600px){
    .mobile-header .header-inner{
        flex-direction:column;
        gap:10px;
    }
    .mobile-header img{
        width:110px;
    }
    .mobile-header h1{
        font-size:20px;
        text-align:center;
    }
}

/* ============================================
   STATUS / GAMIFICATION
   ============================================ */
#statusbar{
    background:#222;
    padding:14px;
    border-radius:10px;
    margin:20px 0;
    font-size:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
#statusbar span{
    color:#ffcc66;
    font-weight:bold;
}
#resetBtn{
    background:#bb2222;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

/* ============================================
   POOL – HORIZONTAL SCROLL
   ============================================ */
#pool{
    background:#2b2b2b;
    padding:14px;
    border-radius:10px;
    min-height:160px;
    margin-bottom:20px;

    display:flex;
    gap:10px;
    overflow-x:auto;
    white-space:nowrap;
}
#pool h2{
    width:100%;
    text-align:center;
    color:#ffcc66;
    margin-bottom:10px;
    white-space:normal;
}

/* ============================================
   SVG IKONER & DRAG ITEMS
   ============================================ */
.icon{
    width:22px;
    height:22px;
    fill:#ffcc66;
}
.item{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:12px 18px;
    background:#444;
    border-radius:10px;
    border:1px solid #0006;
    font-size:17px;
    cursor:pointer;
    white-space:nowrap;

    position:relative;
    touch-action:none;
}
.item.correct{ background:#0a6 !important; }
.item.wrong{ background:#a00 !important; }

/* ============================================
   DROPZONES
   ============================================ */
.grid{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
}
.box{
    background:#1d1d1d;
    padding:12px;
    border-radius:10px;
    flex:1 1 240px;
    border:2px dashed #555;
    min-height:200px;
}
.box h3{
    text-align:center;
    color:#ffcc66;
    margin:0 0 10px;
}
.dropzone{
    background:#222;
    border-radius:6px;
    min-height:140px;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

@media(max-width:600px){
    .grid{ flex-direction:column; }
}
</style>
</head>

<body>
<header class="mobile-header">
    <div class="header-inner">
        assets/logo.png
        <h1>Dataflow – Drag & Drop</h1>
    </div>
</header>

<main>

<!-- ==========================
     STATUS (POINTS + RESET)
     ========================== -->
<div id="statusbar">
    <div>Point: <span id="points">0</span> / <span id="total">0</span></div>
    <button id="resetBtn">Nulstil</button>
</div>

<!-- ==========================
     POOL
     ========================== -->
<section id="pool">
    <h2>Træk elementerne op i den rigtige kategori</h2>
</section>

<!-- ==========================
     KATEGORIER
     ========================== -->
<div class="grid">
    <div class="box" data-cat="sensor">
        <h3>Sensor</h3>
        <div class="dropzone"></div>
    </div>
    <div class="box" data-cat="hmi">
        <h3>HMI</h3>
        <div class="dropzone"></div>
    </div>
    <div class="box" data-cat="lager">
        <h3>Lager / Dataopsamling</h3>
        <div class="dropzone"></div>
    </div>
    <div class="box" data-cat="erp">
        <h3>ERP</h3>
        <div class="dropzone"></div>
    </div>
</div>

</main>

<script>
/* ============================================
   SVG IKONER
   ============================================ */
const ICONS = {
    sensor:`<svg class="icon" viewBox='0 0 24 24'><path d='M12 2a7 7 0 0 1 7 7v2h-2V9a5 5 0 0 0-10 0v2H5V9a7 7 0 0 1 7-7zm-5 9h14v11H7V11zm4 3v2h2v-2h-2zm0 4v2h2v-2h-2z'/></svg>`,
    hmi:`<svg class="icon" viewBox='0 0 24 24'><path d='M4 3h16a2 2 0 0 1 2 2v11H2V5a2 2 0 0 1 2-2zm0 15h16v3H4v-3z'/></svg>`,
    lager:`<svg class="icon" viewBox='0 0 24 24'><path d='M3 3h18v4H3V3zm0 6h18v4H3V9zm0 6h18v4H3v-4z'/></svg>`,
    erp:`<svg class="icon" viewBox='0 0 24 24'><path d='M12 2L2 7l10 5 10-5-10-5zm0 13L2 10v7l10 5 10-5v-7l-10 5z'/></svg>`
};

/* ============================================
   ELEMENTER
   ============================================ */
const items = [
    {label:"Fotocelle", cat:"sensor"},
    {label:"Temperaturføler", cat:"sensor"},
    {label:"Tryktransmitter", cat:"sensor"},
    {label:"Vibrationssensor", cat:"sensor"},

    {label:"Start/Stop tryk", cat:"hmi"},
    {label:"Fejlkvittering", cat:"hmi"},
    {label:"Speed justering", cat:"hmi"},
    {label:"Alarmpanel", cat:"hmi"},

    {label:"Batchnummer", cat:"lager"},
    {label:"Produktionslog", cat:"lager"},
    {label:"Procesdata", cat:"lager"},
    {label:"Sporbarhed", cat:"lager"},

    {label:"Ordrestyring", cat:"erp"},
    {label:"Kundeordre", cat:"erp"},
    {label:"Materialeforbrug", cat:"erp"},
    {label:"Produktionsplan", cat:"erp"}
];

let points = 0;
document.getElementById("total").textContent = items.length;

/* ============================================
   BYG POOL
   ============================================ */
const POOL = document.getElementById("pool");

function buildPool(){
    POOL.innerHTML = "<h2>Træk elementerne op i den rigtige kategori</h2>";

    items.sort(()=>Math.random()-0.5).forEach(obj=>{
        const div = document.createElement("div");
        div.className="item";
        div.dataset.cat = obj.cat;
        div.innerHTML = ICONS[obj.cat] + obj.label;

        POOL.appendChild(div);
        enableTouchDrag(div);  // iPad friendly
    });
}
buildPool();

/* ============================================
   TOUCH & MOUSE DRAG+DROP
   ============================================ */
function enableTouchDrag(el){
    let offsetX = 0;
    let offsetY = 0;
    let moving = false;

    el.addEventListener("touchstart", e=>{
        const touch = e.touches[0];
        const rect = el.getBoundingClientRect();

        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;

        el.style.position = "absolute";
        el.style.zIndex = "999";

        moving = true;
    });

    el.addEventListener("touchmove", e=>{
        if(!moving) return;
        const touch = e.touches[0];
        el.style.left = (touch.clientX - offsetX) + "px";
        el.style.top  = (touch.clientY - offsetY) + "px";
    });

    el.addEventListener("touchend", e=>{
        moving = false;
        dropAttempt(el);
    });

    /* --- Desktop mouse support --- */
    el.addEventListener("mousedown", e=>{
        offsetX = e.clientX - el.getBoundingClientRect().left;
        offsetY = e.clientY - el.getBoundingClientRect().top;

        el.style.position="absolute";
        el.style.zIndex="999";

        moving = true;
    });

    document.addEventListener("mousemove", e=>{
        if(!moving) return;
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top  = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", e=>{
        if(moving){
            moving = false;
            dropAttempt(el);
        }
    });
}

/* ============================================
   DROP CHECK
   ============================================ */
function dropAttempt(el){
    const boxes = document.querySelectorAll(".box");

    let placed = false;

    boxes.forEach(box=>{
        const rect = box.getBoundingClientRect();

        // hvis centrum af item lander i zone
        const cx = el.getBoundingClientRect().left + el.offsetWidth/2;
        const cy = el.getBoundingClientRect().top + el.offsetHeight/2;

        if(cx > rect.left && cx < rect.right && cy > rect.top && cy < rect.bottom){
            if(el.dataset.cat === box.dataset.cat){
                el.classList.add("correct");
                el.classList.remove("wrong");

                el.style.position="relative";
                el.style.left="0px";
                el.style.top="0px";

                box.querySelector(".dropzone").appendChild(el);

                points++;
                document.getElementById("points").textContent = points;

            } else {
                el.classList.add("wrong");
                POOL.appendChild(el);
                el.style.position="relative";
                el.style.left="0";
                el.style.top="0";
            }

            placed = true;
        }
    });

    if(!placed){
        POOL.appendChild(el);
        el.style.position="relative";
        el.style.left="0";
        el.style.top="0";
    }
}

/* ============================================
   RESET KNAP
   ============================================ */
document.getElementById("resetBtn").addEventListener("click", ()=>{
    points = 0;
    document.getElementById("points").textContent = "0";

    document.querySelectorAll(".dropzone").forEach(z=> z.innerHTML = "");
    buildPool();
});
</script>

</body>
</html>
